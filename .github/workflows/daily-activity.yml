name: Daily Activity

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours (12 times a day)
  workflow_dispatch:

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update ACTIVITY.md
        run: |
          echo "Last active: $(date)" > ACTIVITY.md

      - name: Commit and Push
        run: |
          git config --global user.name "Selorm Walker"
          git config --global user.email "selormwalker@example.com"
          git add ACTIVITY.md
          git commit -m "chore: daily activity update [skip ci]" || echo "No changes to commit"
          git push

